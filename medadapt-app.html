<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedAdapt · USMLE Step 1 & Step 2 CK — Adaptive Engine</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg-base:#0a0e27; --bg-surface:#0f1535;
  --bg-card:rgba(255,255,255,.04); --bg-card-hover:rgba(255,255,255,.07);
  --glass-bg:rgba(255,255,255,.05); --glass-border:rgba(255,255,255,.09);
  --text-primary:#e8eaf6; --text-secondary:rgba(232,234,246,.65); --text-tertiary:rgba(232,234,246,.4);
  --text-accent:#a5b4fc;
  --grad-primary:linear-gradient(135deg,#667eea,#764ba2);
  --grad-secondary:linear-gradient(135deg,#4facfe,#00f2fe);
  --success:#43e97b; --success-soft:rgba(67,233,123,.15);
  --warning:#fbbf24; --warning-soft:rgba(251,191,36,.15);
  --danger:#f5576c; --danger-soft:rgba(245,87,108,.15);
  --info:#a18cd1; --accent:#4facfe;
  --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:22px; --r-full:9999px;
  --ease:cubic-bezier(.4,0,.2,1); --bounce:cubic-bezier(.34,1.56,.64,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif;
  background:radial-gradient(1200px 800px at 15% -10%,#1a2050 0%,transparent 55%),
             radial-gradient(1000px 700px at 100% 0%,#241a4a 0%,transparent 50%),
             var(--bg-base);
  color:var(--text-primary); min-height:100vh; line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:1120px;margin:0 auto;padding:28px 22px 80px}
.hidden{display:none!important}
button{font-family:inherit;cursor:pointer;border:none}
.btn{
  padding:13px 26px;border-radius:var(--r-full);font-weight:700;font-size:15px;
  background:var(--grad-primary);color:#fff;transition:.25s var(--ease);
  box-shadow:0 8px 24px rgba(102,126,234,.32);letter-spacing:.2px;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(102,126,234,.45)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn.ghost{background:var(--glass-bg);border:1px solid var(--glass-border);box-shadow:none}
.btn.ghost:hover{background:var(--bg-card-hover)}
.btn.sm{padding:9px 18px;font-size:13px}
.card{
  background:var(--glass-bg);border:1px solid var(--glass-border);
  border-radius:var(--r-xl);padding:26px;backdrop-filter:blur(20px);
  box-shadow:0 8px 32px rgba(0,0,0,.28);
}
.brand{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.brand .logo{
  width:52px;height:52px;border-radius:16px;background:var(--grad-primary);
  display:grid;place-items:center;font-size:26px;box-shadow:0 8px 22px rgba(102,126,234,.4);
}
.brand h1{font-size:26px;font-weight:800;letter-spacing:-.5px}
.brand .grad{background:var(--grad-secondary);-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{color:var(--text-secondary);font-size:14px}
.pill{display:inline-block;padding:4px 12px;border-radius:var(--r-full);font-size:12px;font-weight:700}
.pill.step1{background:rgba(161,140,209,.18);color:#c4b5fd}
.pill.step2{background:rgba(79,172,254,.16);color:#7dd3fc}
h2.sec{font-size:20px;font-weight:800;margin-bottom:4px}
.muted{color:var(--text-secondary)}
.tiny{font-size:12px;color:var(--text-tertiary)}
label.fld{display:block;font-size:13px;font-weight:600;color:var(--text-secondary);margin:16px 0 7px}
input.f,select.f{
  width:100%;padding:12px 14px;border-radius:var(--r-md);background:rgba(255,255,255,.05);
  border:1px solid var(--glass-border);color:var(--text-primary);font-size:15px;outline:none;transition:.2s;
}
input.f:focus,select.f:focus{border-color:var(--accent);background:rgba(79,172,254,.07)}
select.f option{background:#141a3a}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.goalcards{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px}
.goalcard{
  padding:18px;border-radius:var(--r-lg);border:2px solid var(--glass-border);
  background:var(--bg-card);cursor:pointer;transition:.2s var(--ease);
}
.goalcard:hover{background:var(--bg-card-hover)}
.goalcard.on{border-color:var(--accent);background:rgba(79,172,254,.1);box-shadow:0 0 0 3px rgba(79,172,254,.12)}
.goalcard .t{font-weight:800;font-size:16px;margin-bottom:4px}

/* progress bar */
.pbar{height:8px;border-radius:var(--r-full);background:rgba(255,255,255,.08);overflow:hidden}
.pbar>i{display:block;height:100%;background:var(--grad-secondary);border-radius:var(--r-full);transition:width .4s var(--ease)}

/* question */
.qmeta{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px}
.qdomain{font-weight:700;font-size:13px;color:var(--text-accent)}
.chip{padding:3px 10px;border-radius:var(--r-full);font-size:11px;font-weight:700;background:rgba(255,255,255,.07);color:var(--text-secondary)}
.vignette{font-size:16px;line-height:1.65;margin:6px 0 18px}
.stem{font-weight:700;margin-bottom:14px}
.opt{
  display:flex;gap:13px;align-items:flex-start;padding:14px 16px;border-radius:var(--r-md);
  border:1.5px solid var(--glass-border);background:var(--bg-card);margin-bottom:10px;
  cursor:pointer;transition:.16s var(--ease);
}
.opt:hover{background:var(--bg-card-hover);border-color:rgba(255,255,255,.2)}
.opt .k{
  flex:0 0 26px;height:26px;border-radius:8px;background:rgba(255,255,255,.08);
  display:grid;place-items:center;font-weight:800;font-size:13px;color:var(--text-secondary);
}
.opt.sel{border-color:var(--accent);background:rgba(79,172,254,.1)}
.opt.sel .k{background:var(--accent);color:#001}
.opt.correct{border-color:var(--success);background:var(--success-soft)}
.opt.correct .k{background:var(--success);color:#003}
.opt.wrong{border-color:var(--danger);background:var(--danger-soft)}
.opt.wrong .k{background:var(--danger);color:#fff}
.opt.disabled{cursor:default;pointer-events:none}
.explain{
  margin-top:6px;padding:15px 17px;border-radius:var(--r-md);
  background:rgba(67,233,123,.07);border:1px solid rgba(67,233,123,.22);font-size:14px;line-height:1.6;
}
.explain.bad{background:rgba(245,87,108,.07);border-color:rgba(245,87,108,.25)}
.explain b{color:var(--text-primary)}
.link-note{margin-top:9px;font-size:12.5px;color:var(--text-accent)}
.navrow{display:flex;justify-content:space-between;align-items:center;margin-top:20px;gap:12px}

/* results */
.statgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:20px 0}
.stat{padding:18px;border-radius:var(--r-lg);background:var(--bg-card);border:1px solid var(--glass-border);text-align:center}
.stat .n{font-size:30px;font-weight:800;line-height:1.1}
.stat .l{font-size:12px;color:var(--text-secondary);margin-top:4px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
.domlist{display:flex;flex-direction:column;gap:10px}
.domrow{display:flex;align-items:center;gap:12px}
.domrow .ico{font-size:20px;width:26px;text-align:center}
.domrow .nm{flex:1;font-size:13.5px;font-weight:600}
.domrow .barwrap{flex:1.4;height:9px;border-radius:var(--r-full);background:rgba(255,255,255,.07);overflow:hidden}
.domrow .barwrap>i{display:block;height:100%;border-radius:var(--r-full)}
.domrow .pct{width:44px;text-align:right;font-size:12.5px;font-weight:800}
.status-tag{font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:var(--r-full);white-space:nowrap}
.st-crit{background:var(--danger-soft);color:#ff8fa0}
.st-weak{background:var(--warning-soft);color:#fcd34d}
.st-pass{background:rgba(79,172,254,.15);color:#7dd3fc}
.st-mast{background:var(--success-soft);color:#6ee7a0}

/* dashboard */
.dashgrid{display:grid;grid-template-columns:1.15fr .85fr;gap:20px;align-items:start}
.plan-item{
  display:flex;gap:14px;padding:15px;border-radius:var(--r-md);background:var(--bg-card);
  border:1px solid var(--glass-border);margin-bottom:11px;align-items:flex-start;
}
.plan-item .day{
  flex:0 0 54px;height:54px;border-radius:12px;background:var(--grad-primary);
  display:grid;place-items:center;text-align:center;font-weight:800;font-size:11px;line-height:1.1;color:#fff;
}
.plan-item .body{flex:1}
.plan-item .body .h{font-weight:700;font-size:14.5px;margin-bottom:3px}
.badge{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--r-full);
  background:var(--glass-bg);border:1px solid var(--glass-border);font-size:12.5px;font-weight:700;margin:5px 6px 0 0}
.badge.locked{opacity:.4}
.streakbig{display:flex;align-items:center;gap:14px}
.streakbig .fire{font-size:40px}
.streakbig .n{font-size:34px;font-weight:800}
.toast{
  position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);
  background:#141a3a;border:1px solid var(--glass-border);padding:14px 22px;border-radius:var(--r-full);
  box-shadow:0 12px 40px rgba(0,0,0,.5);opacity:0;transition:.35s var(--bounce);z-index:99;font-weight:600;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.loader{display:inline-block;width:18px;height:18px;border:3px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:-3px;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.fade{animation:fade .45s var(--ease)}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.divider{height:1px;background:var(--glass-border);margin:22px 0}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--text-secondary);margin-top:10px}
.legend span{display:flex;align-items:center;gap:6px}
.dot{width:10px;height:10px;border-radius:50%}
@media(max-width:820px){
  .two,.dashgrid,.grid2,.goalcards,.statgrid{grid-template-columns:1fr}
  .statgrid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="logo">🧠</div>
    <div>
      <h1>Med<span class="grad">Adapt</span></h1>
      <div class="sub">Adaptive Engine · USMLE Step 1 &amp; Step 2 CK Edition</div>
    </div>
  </div>

  <!-- ============ SCREEN: ONBOARDING ============ -->
  <div id="scr-onboard" class="fade" style="margin-top:22px"></div>
  <!-- ============ SCREEN: TEST ============ -->
  <div id="scr-test" class="hidden"></div>
  <!-- ============ SCREEN: RESULTS ============ -->
  <div id="scr-results" class="hidden"></div>
  <!-- ============ SCREEN: DASHBOARD ============ -->
  <div id="scr-dash" class="hidden"></div>
</div>
<div id="toast" class="toast"></div>

<script>
/* =========================================================================
   MedAdapt — Standalone Adaptive Engine (offline, no server/API key)
   Flow: Onboarding -> Diagnostic Test (40Q) -> Results+Radar+Gaps ->
         Adaptive Dashboard (SM-2 plan, targeted daily test, streak/badges)
   ========================================================================= */

/* ---------- 13 DOMAINS (7 clinical Step2CK + 6 basic Step1) ---------- */
const DOMAINS = {
  internal:     {name:'Nội khoa', en:'Internal Medicine', icon:'🫀', step:2, link:'pharmacology'},
  surgery:      {name:'Ngoại khoa & Chấn thương', en:'Surgery', icon:'🔪', step:2, link:'pathology'},
  obgyn:        {name:'Sản phụ khoa', en:'OB/GYN', icon:'🤰', step:2, link:'pharmacology'},
  pediatrics:   {name:'Nhi khoa', en:'Pediatrics', icon:'👶', step:2, link:'microbiology'},
  emergency:    {name:'Cấp cứu & Hồi sức', en:'Emergency', icon:'🚑', step:2, link:'physiology'},
  psychneuro:   {name:'Tâm thần & Thần kinh', en:'Psych & Neuro', icon:'🧠', step:2, link:'pharmacology'},
  labdx:        {name:'Cận lâm sàng & CĐHA', en:'Labs & Imaging', icon:'🩺', step:2, link:'pathology'},
  pathology:    {name:'GPB & Sinh lý bệnh', en:'Pathology', icon:'🔬', step:1, link:'physiology'},
  pharmacology: {name:'Dược lý lâm sàng', en:'Pharmacology', icon:'💊', step:1, link:'physiology'},
  physiology:   {name:'Sinh lý học', en:'Physiology', icon:'⚡', step:1, link:'pathology'},
  microbiology: {name:'Vi sinh & Miễn dịch', en:'Micro & Immuno', icon:'🦠', step:1, link:'pathology'},
  biochemistry: {name:'Hóa sinh & Di truyền', en:'Biochem & Genetics', icon:'🧬', step:1, link:'pathology'},
  community:    {name:'YHDP, Thống kê & Y đức', en:'Prev/Biostats/Ethics', icon:'🌍', step:1, link:'physiology'},
};
const DOMAIN_KEYS = Object.keys(DOMAINS);

/* ---------- QUESTION BANK (40 clinical vignettes) ----------
   Each: domain, step, diff(1-5), bloom, vignette, stem, options[5], correct(idx),
   exp (explanation), link (basic-science domain activated on miss) */
const BANK = [
/* ---- INTERNAL MEDICINE ---- */
{domain:'internal',step:2,diff:3,bloom:'apply',
 vignette:'Nam 68 tuổi, khó thở khi gắng sức, khó thở khi nằm và phù hai chân tăng dần 3 tháng. Khám: ran ẩm hai đáy phổi, tĩnh mạch cổ nổi, tiếng T3. Siêu âm tim EF 28%.',
 stem:'Thuốc nào giúp GIẢM TỬ VONG và nên khởi đầu cho bệnh nhân này?',
 options:['Furosemide đơn thuần','Lisinopril (ức chế men chuyển)','Digoxin','Amlodipine','Diltiazem'],
 correct:1,
 exp:'Suy tim EF giảm (HFrEF): ức chế men chuyển (ACEi) và chẹn beta là nền tảng giúp giảm tử vong. Lợi tiểu chỉ giảm triệu chứng sung huyết, không cải thiện sống còn.',
 link:'pharmacology'},
{domain:'internal',step:2,diff:2,bloom:'apply',
 vignette:'Nữ 55 tuổi, BMI 32, không bệnh tim/thận. Xét nghiệm HbA1c 8.2%, đường huyết đói 168 mg/dL. Chẩn đoán đái tháo đường type 2 mới.',
 stem:'Thuốc hàng đầu (first-line) là gì?',
 options:['Insulin nền','Glipizide','Metformin','Pioglitazone','Empagliflozin'],
 correct:2,
 exp:'Metformin là first-line cho ĐTĐ type 2: giảm sản xuất glucose ở gan, không gây hạ đường huyết, trung tính cân nặng, giảm biến cố tim mạch.',
 link:'pharmacology'},
{domain:'internal',step:2,diff:3,bloom:'analyze',
 vignette:'Nam 60 tuổi hút thuốc 40 gói-năm, ho khạc đờm mạn ≥3 tháng/năm trong 2 năm liên tiếp, khó thở gắng sức tiến triển. FEV1/FVC 0.62 sau giãn phế quản.',
 stem:'Can thiệp nào GIẢM TỬ VONG nhiều nhất ở bệnh nhân COPD này?',
 options:['Cai thuốc lá','Corticoid hít liều cao','Kháng sinh dự phòng','Theophylline','Bổ sung vitamin D'],
 correct:0,
 exp:'Ở COPD, cai thuốc lá và oxy dài hạn (khi giảm oxy máu) là hai biện pháp duy nhất chứng minh giảm tử vong. Thuốc giãn phế quản/ICS chủ yếu cải thiện triệu chứng.',
 link:'physiology'},

/* ---- SURGERY ---- */
{domain:'surgery',step:2,diff:2,bloom:'apply',
 vignette:'Nam 22 tuổi, đau quanh rốn di chuyển xuống hố chậu phải sau 12 giờ, sốt nhẹ 38°C, buồn nôn. Khám: phản ứng dội tại điểm McBurney. Bạch cầu 14.000.',
 stem:'Xử trí phù hợp nhất?',
 options:['Kháng sinh và theo dõi ngoại trú','Cắt ruột thừa','Nội soi đại tràng cấp','Chụp lưu thông ruột','Truyền dịch rồi xuất viện'],
 correct:1,
 exp:'Viêm ruột thừa cấp điển hình: cắt ruột thừa là điều trị chuẩn. Chậm trễ làm tăng nguy cơ vỡ và viêm phúc mạc.',
 link:'pathology'},
{domain:'surgery',step:2,diff:3,bloom:'apply',
 vignette:'Nam 71 tuổi hút thuốc, khám định kỳ phát hiện khối đập theo mạch ở bụng. CT: phình động mạch chủ bụng dưới thận đường kính 5.8 cm, không triệu chứng.',
 stem:'Xử trí đúng nhất?',
 options:['Theo dõi siêu âm mỗi 6 tháng','Sửa chữa phình (mổ mở hoặc EVAR) theo chương trình','Chỉ dùng chẹn beta','Mổ cấp cứu ngay','Chống đông kháng vitamin K'],
 correct:1,
 exp:'Phình ĐMC bụng ≥5.5 cm (hoặc lớn nhanh >0.5cm/6 tháng, hoặc có triệu chứng) có chỉ định sửa chữa theo chương trình vì nguy cơ vỡ vượt nguy cơ mổ.',
 link:'pathology'},
{domain:'surgery',step:2,diff:2,bloom:'understand',
 vignette:'Nữ 54 tuổi sốt 38.3°C vào ngày hậu phẫu thứ 1 sau mổ mở cắt túi mật. Khám phổi giảm thông khí đáy, không đau chân, vết mổ khô.',
 stem:'Nguyên nhân sốt nhiều khả năng nhất?',
 options:['Nhiễm trùng vết mổ','Xẹp phổi','Huyết khối tĩnh mạch sâu','Nhiễm trùng tiểu do sonde','Áp xe tồn dư'],
 correct:1,
 exp:'Sốt ngày hậu phẫu 1 (sớm) thường do xẹp phổi ("Wind"). Quy tắc 5W theo thời gian: Wind→Water→Walking→Wound→Wonder drugs.',
 link:'physiology'},

/* ---- OB/GYN ---- */
{domain:'obgyn',step:2,diff:3,bloom:'apply',
 vignette:'Sản phụ 28 tuổi thai 33 tuần, huyết áp 162/112 mmHg hai lần cách 4 giờ, protein niệu (+++), đau đầu và nhìn mờ.',
 stem:'Ngoài kiểm soát huyết áp, thuốc nào bắt buộc dùng để DỰ PHÒNG CO GIẬT?',
 options:['Diazepam','Magnesium sulfate','Phenytoin','Labetalol','Nifedipine'],
 correct:1,
 exp:'Tiền sản giật nặng: magnesium sulfate là thuốc chọn để dự phòng và điều trị sản giật (co giật), vượt trội phenytoin/diazepam.',
 link:'pharmacology'},
{domain:'obgyn',step:2,diff:3,bloom:'apply',
 vignette:'Nữ 26 tuổi trễ kinh 6 tuần, đau hố chậu phải, β-hCG 1.800 mIU/mL. Siêu âm đầu dò không thấy túi thai trong buồng tử cung, khối cạnh phần phụ 2 cm, huyết động ổn định, không vỡ.',
 stem:'Điều trị thích hợp nhất?',
 options:['Theo dõi hCG mỗi 48 giờ tại nhà','Methotrexate','Cắt tử cung','Nạo buồng tử cung','Oxytocin'],
 correct:1,
 exp:'Thai ngoài tử cung chưa vỡ, huyết động ổn, hCG không quá cao, khối nhỏ: methotrexate (kháng chuyển hóa folate) là lựa chọn nội khoa.',
 link:'pharmacology'},
{domain:'obgyn',step:2,diff:2,bloom:'analyze',
 vignette:'Nữ 24 tuổi kinh thưa, rậm lông, mụn trứng cá, BMI 30, hiếm muộn nguyên phát. Xét nghiệm tỷ lệ LH:FSH tăng, siêu âm buồng trứng đa nang.',
 stem:'Thuốc kích thích phóng noãn hàng đầu để điều trị hiếm muộn do PCOS?',
 options:['Letrozole','Estrogen liều cao','Bromocriptine','Metformin đơn thuần','Progesterone'],
 correct:0,
 exp:'PCOS gây rối loạn phóng noãn. Letrozole (ức chế aromatase) hiện là first-line kích thích phóng noãn, hiệu quả hơn clomiphene về tỷ lệ sinh sống.',
 link:'physiology'},

/* ---- PEDIATRICS ---- */
{domain:'pediatrics',step:2,diff:2,bloom:'apply',
 vignette:'Bé trai 2 tuổi ho "ông ổng" như chó sủa, khàn tiếng, thở rít thì hít vào, sốt nhẹ về đêm. X-quang cổ: dấu hiệu "steeple" (tháp chuông).',
 stem:'Điều trị phù hợp nhất cho trường hợp này?',

/* =========================================================================
   MedAdapt ENGINE — Multi-Agent Architecture (chạy client-side, offline)
   ORCHESTRATOR điều phối 7 AGENT; mỗi Agent dùng các SKILL (12) + DATA layer.
   (Có thể thay các skill sinh nội dung bằng AI thật khi nối backend.)
   ========================================================================= */

/* ---------- 💾 DATA LAYER (mô phỏng SQLite schema.sql · 13 môn) ---------- */
const DB = {
  users:[], trackers:{}, sessions:[], reviews:[], lessons:[], notion:{synced:false,at:null},
  createUser(u){ const id='u'+(this.users.length+1); const rec={id,...u,created:Date.now()};
    this.users.push(rec); this.trackers[id]={};
    DOMAIN_KEYS.forEach(k=>this.trackers[id][k]={correct:0,total:0,ability:3}); return rec; },
  saveSession(s){ this.sessions.push(s); return s; },
  logReview(r){ this.reviews.push(r); },
};

/* ---------- ⚡ 12 SKILLS (src/skills/) ---------- */
const SKILLS = {
  /* 1  bloom-classifier      */ 'bloom-classifier'(q){ return q.bloom || 'apply'; },
  /* 2  difficulty-calibrator */ 'difficulty-calibrator'(ability, lastCorrect){
        let d=Math.round(ability); if(lastCorrect===true)d++; if(lastCorrect===false)d--;
        return Math.max(1,Math.min(5,d)); },
  /* 3  mcq-generator         */ 'mcq-generator'({domains, count, ability=3, perDomain=null, random=true}){
        // Bốc câu MỚI mỗi lần: random=true xáo trộn để mỗi đề khác nhau;
        // perDomain: số câu lấy mỗi chuyên khoa (vd 2 -> đề cân bằng 26 câu).
        const target=SKILLS['difficulty-calibrator'](ability,null);
        const doms=(domains&&domains.length)?domains:DOMAIN_KEYS;
        const pickFrom=(d)=>{ let qs=BANK.filter(q=>q.domain===d);
          return random ? shuffle(qs)
                        : qs.slice().sort((a,b)=>Math.abs((a.diff||3)-target)-Math.abs((b.diff||3)-target)); };
        if(perDomain){ let out=[]; doms.forEach(d=>{ out=out.concat(pickFrom(d).slice(0,perDomain)); });
          out=random?shuffle(out):out; return count?out.slice(0,count):out; }
        const byd={}; doms.forEach(d=>byd[d]=pickFrom(d));
        const out=[]; let i=0;
        while(out.length<(count||0)){ let added=false;
          for(const d of doms){ if(byd[d][i]){ out.push(byd[d][i]); added=true; if(out.length>=count)break; } }
          if(!added)break; i++; }
        return random?shuffle(out):out; },
  /* 4  gap-detector          */ 'gap-detector'(scores){
        const gaps=[]; DOMAIN_KEYS.forEach(k=>{ const s=scores[k]; if(!s||!s.total)return;
          const pct=Math.round(s.correct/s.total*100);
          if(pct<75) gaps.push({domain:k, pct, severity: pct<30?'critical':pct<50?'weak':'developing', link:DOMAINS[k].link}); });
        return gaps.sort((a,b)=>a.pct-b.pct); },
  /* 5  radar-builder         */ 'radar-builder'(scores){
        const rated=DOMAIN_KEYS.map(k=>({k, pct: scores[k]&&scores[k].total?Math.round(scores[k].correct/scores[k].total*100):null})).filter(d=>d.pct!==null);
        return {labels:rated.map(d=>DOMAINS[d.k].icon), data:rated.map(d=>d.pct), rated}; },
  /* 6  sm2-scheduler         */ 'sm2-scheduler'(quality, rep, ef){
        ef=ef+(0.1-(5-quality)*(0.08+(5-quality)*0.02)); if(ef<1.3)ef=1.3;
        if(quality<3) return {interval:1, ef, rep:0};
        rep=rep+1; const interval= rep===1?1 : rep===2?3 : Math.round(6*ef);
        return {interval, ef, rep}; },
  /* 7  knowledge-retriever   */ 'knowledge-retriever'(domain){
        const G={ internal:['ACC/AHA','ADA','KDIGO','GOLD'], surgery:['ACS','ATLS'], obgyn:['ACOG'],
          pediatrics:['AAP','Nelson'], emergency:['ACLS/ATLS','AHA'], psychneuro:['DSM-5-TR','AHA Stroke'],
          labdx:['CAP','Light criteria'], pathology:['Robbins'], pharmacology:['Katzung','FDA'],
          physiology:['Guyton'], microbiology:['CDC','IDSA'], biochemistry:['Lippincott','OMIM'], community:['USPSTF','CDC'] };
        return G[domain]||['USMLE High-Yield']; },
  /* 8  lesson-composer       */ 'lesson-composer'(domain){
        const qs=BANK.filter(q=>q.domain===domain), dom=DOMAINS[domain];
        return { title:`Masterclass: ${dom.name}`, step:dom.step,
          pathophysiology:`Cơ chế bệnh sinh trọng tâm của ${dom.name}, liên kết nền tảng ${DOMAINS[dom.link]?DOMAINS[dom.link].name:dom.link}.`,
          algorithm:['Nhận diện hội chứng/triệu chứng chính','Chẩn đoán phân biệt (VINDICATE)','Cận lâm sàng ban đầu vs xác định','Điều trị theo guideline','Theo dõi & biến chứng'],
          highYield: qs.map(q=>q.exp).slice(0,5), guideline: SKILLS['knowledge-retriever'](domain) }; },
  /* 9  case-simulator        */ 'case-simulator'(domain){
        const qs=BANK.filter(q=>q.domain===domain); if(!qs.length)return null;
        const q=qs[Math.floor(Math.random()*qs.length)];
        return { domain, phases:[
          {name:'1. Bệnh sử', prompt:q.vignette},
          {name:'2. Chẩn đoán phân biệt (VINDICATE)', prompt:'Vascular · Infectious · Neoplastic · Degenerative · Iatrogenic · Congenital · Autoimmune · Traumatic · Endocrine — nhóm nào phù hợp nhất?'},
          {name:'3. Câu hỏi Socratic', prompt:q.stem},
          {name:'4. Xét nghiệm: ban đầu vs xác định', prompt:'Chọn cận lâm sàng hợp lý nhất trước khi chốt.'},
          {name:'5. Chốt & lý giải', prompt:`Đáp án: ${'ABCDE'[q.correct]}. ${q.options[q.correct]} — ${q.exp}`} ] }; },
  /* 10 daily-briefing        */ 'daily-briefing'(state, gaps){
        const top=gaps[0];
        return `Chào ${state.user.name}! Ngày ${state.day} · streak ${state.streak}🔥. `+
          (top?`Ưu tiên hôm nay: ${DOMAINS[top.domain].icon} ${DOMAINS[top.domain].name} (${top.pct}%). `:'Nền tảng ổn — hôm nay củng cố & nâng cao. ')+
          `Mục tiêu ${state.user.minutes} phút. Đều tay là tới 250+.`; },
  /* 11 streak-motivator      */ 'streak-motivator'(state, rated){
        const B=[ {id:'first',ico:'🎓',name:'Khởi động',cond:()=>true},
          {id:'streak3',ico:'🔥',name:'3 ngày streak',cond:()=>state.streak>=3},
          {id:'streak7',ico:'⚡',name:'7 ngày streak',cond:()=>state.streak>=7},
          {id:'nogap',ico:'🛡️',name:'Không lỗ hổng',cond:()=>rated.length&&rated.every(d=>d.pct>=50)},
          {id:'master',ico:'🏆',name:'Thành thạo 1 khoa',cond:()=>rated.some(d=>d.pct>=75)},
          {id:'allmaster',ico:'👑',name:'Bậc thầy 250+',cond:()=>rated.length&&rated.every(d=>d.pct>=75)} ];
        B.forEach(b=>{ if(!state.badges.includes(b.id)&&b.cond()) state.badges.push(b.id); });
        return {all:B, unlocked:state.badges.slice()}; },
  /* 12 notion-sync           */ 'notion-sync'(state){ DB.notion={synced:true, at:Date.now(), day:state.day}; return DB.notion; },
};

/* ---------- 🤖 7 AGENTS (src/agents/) ---------- */
const AGENTS = {
  assessment:{ // AssessmentAgent — tạo đề & chấm thi
    createDiagnostic(user, opts){ opts=opts||{};
      // Mặc định: 2 câu/khoa ngẫu nhiên = 26 câu, KHÁC NHAU mỗi lần vào test.
      const perDomain=opts.perDomain||2;
      return {type:'diagnostic',
        questions: SKILLS['mcq-generator']({domains:null, perDomain, count:opts.count||perDomain*DOMAIN_KEYS.length, ability:3, random:true})}; },
    createDaily(scores, count){
      const gaps=SKILLS['gap-detector'](scores);
      const domains=(gaps.length?gaps.map(g=>g.domain):SKILLS['radar-builder'](scores).rated.map(d=>d.k)).slice(0,4);
      const ability=domains.reduce((a,d)=>a+((scores[d]&&scores[d].total)?scores[d].correct/scores[d].total*5:3),0)/(domains.length||1);
      let qs=SKILLS['mcq-generator']({domains, count:count||12, ability});
      if(qs.length<6) qs=SKILLS['mcq-generator']({domains:null, count:12, ability:3});
      return {type:'daily', questions:qs, focus:domains}; },
    grade(questions, answers){ let correct=0; const perDom={};
      questions.forEach(q=>{ if(answers[q.id]===undefined)return;
        perDom[q.domain]=perDom[q.domain]||{correct:0,total:0}; perDom[q.domain].total++;
        if(answers[q.id]===q.correct){ correct++; perDom[q.domain].correct++; } });
      return {correct, perDom}; } },
  analyst:{ // AnalystAgent — phân tích lỗ hổng
    analyze(scores){ return {gaps:SKILLS['gap-detector'](scores), radar:SKILLS['radar-builder'](scores)}; } },
  curriculum:{ // CurriculumAgent — lộ trình SM-2
    plan(scores, days){ days=days||7;
      const rated=SKILLS['radar-builder'](scores).rated.slice().sort((a,b)=>a.pct-b.pct);
      const pool=(rated.filter(d=>d.pct<75).length?rated.filter(d=>d.pct<75):rated);
      if(!pool.length) return [];
      const out=[]; let ef=2.5;
      for(let day=1;day<=days;day++){ const d=pool[(day-1)%pool.length];
        const quality=Math.round(d.pct/100*5);
        const s=SKILLS['sm2-scheduler'](quality, Math.floor((day-1)/pool.length), ef); ef=s.ef;
        const sev=d.pct<30?'critical':d.pct<50?'weak':'developing';
        out.push({day, domain:d.k, interval:s.interval, link:DOMAINS[d.k].link,
          task: sev==='critical'?'Masterclass + ca lâm sàng Socratic (lấp lỗ hổng)'
              : sev==='weak'?'Ôn bài giảng trọng tâm + 8 câu luyện' : 'Củng cố & câu độ khó cao'}); }
      return out; } },
  content:{ lesson(domain){ const l=SKILLS['lesson-composer'](domain); DB.lessons.push(l); return l; } },   // ContentAgent
  mentor:{ case(domain){ return SKILLS['case-simulator'](domain); } },                                        // MentorAgent
  coach:{ motivate(state, radar){ // CoachAgent
      const badges=SKILLS['streak-motivator'](state, radar.rated);
      const briefing=SKILLS['daily-briefing'](state, SKILLS['gap-detector'](state.scores));
      return {badges, briefing}; } },
  notion:{ sync(state){ return SKILLS['notion-sync'](state); } },                                             // NotionAgent
};

/* ---------- 🎼 ORCHESTRATOR (src/agents/orchestrator.js) ---------- */
const ORCH = {
  intake(user, count){ return AGENTS.assessment.createDiagnostic(user, count); },
  submit(questions, answers, scores){
    const g=AGENTS.assessment.grade(questions, answers);
    Object.keys(g.perDom).forEach(k=>{ if(!scores[k])scores[k]={correct:0,total:0};
      scores[k].correct+=g.perDom[k].correct; scores[k].total+=g.perDom[k].total; });
    return {grade:g, analysis:AGENTS.analyst.analyze(scores)}; },
  dashboard(state){ const analysis=AGENTS.analyst.analyze(state.scores);
    return {analysis, plan:AGENTS.curriculum.plan(state.scores),
            coach:AGENTS.coach.motivate(state, analysis.radar), notion:AGENTS.notion.sync(state)}; },
  daily(state){ return AGENTS.assessment.createDaily(state.scores, 12); },
  lesson(domain){ return AGENTS.content.lesson(domain); },
  case(domain){ return AGENTS.mentor.case(domain); },
};

/* ---------- utils ---------- */
const el = id => document.getElementById(id);
function show(scr){
  ['scr-onboard','scr-test','scr-results','scr-dash'].forEach(s=>el(s).classList.add('hidden'));
  el(scr).classList.remove('hidden'); el(scr).classList.add('fade');
  window.scrollTo({top:0,behavior:'smooth'});
}
function toast(msg){
  const t=el('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2600);
}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function statusOf(p){ if(p<30)return{k:'crit',t:'Critical',cls:'st-crit',c:'#f5576c'};
  if(p<50)return{k:'weak',t:'Yếu',cls:'st-weak',c:'#fbbf24'};
  if(p<75)return{k:'pass',t:'Đạt',cls:'st-pass',c:'#4facfe'};
  return{k:'mast',t:'Thành thạo',cls:'st-mast',c:'#43e97b'}; }

/* ---------- DIAGNOSTIC TEST ---------- */
function startDiagnostic(){
  // ORCHESTRATOR -> AssessmentAgent (mcq-generator: bốc 2 câu/khoa ngẫu nhiên = 26 câu, mới mỗi lần)
  S.mode='diagnostic'; S.scores={};
  DB.createUser(S.user);
  const {questions}=ORCH.intake(S.user);
  buildAttempt(questions);
  S.idx=0; S.answers={};
  renderTest();
}
/* Tạo "đề" cho lượt hiện tại: đảo vị trí đáp án A–E (không đụng BANK gốc) */
function buildAttempt(questions){
  S.quiz={};
  questions.forEach(q=>{
    const idx=shuffle(q.options.map((_,i)=>i));
    S.quiz[q.id]={...q, options:idx.map(i=>q.options[i]), correct:idx.indexOf(q.correct)};
  });
  S.order=questions.map(q=>q.id);
}
function currentQ(){ return S.quiz[S.order[S.idx]] || BANK.find(q=>q.id===S.order[S.idx]); }

function renderTest(){
  show('scr-test');
  const q=currentQ(), total=S.order.length, n=S.idx+1;
  const answered=S.answers[q.id]!==undefined;
  const dom=DOMAINS[q.domain];
  const stepCls=dom.step===1?'step1':'step2';
  el('scr-test').innerHTML = `
  <div class="card">
    <div class="section-head">
      <div>
        <div class="tiny">${S.mode==='diagnostic'?'Bài test đầu vào (Diagnostic)':'Bài test thích ứng hàng ngày'}</div>
        <div style="font-weight:800;font-size:16px">Câu ${n}/${total}</div>
      </div>
      <span class="pill ${stepCls}">${dom.step===1?'STEP 1':'STEP 2 CK'}</span>
    </div>
    <div class="pbar" style="margin-bottom:20px"><i style="width:${(n/total)*100}%"></i></div>

    <div class="qmeta">
      <span class="qdomain">${dom.icon} ${dom.name}</span>
      <span class="chip">Độ khó ${q.diff}/5</span>
      <span class="chip">Bloom: ${q.bloom}</span>
    </div>
    <div class="vignette">${q.vignette}</div>
    <div class="stem">${q.stem}</div>
    <div id="opts"></div>
    <div id="exp-slot"></div>
    <div class="navrow">
      <button class="btn ghost sm" id="btn-prev" ${S.idx===0?'disabled':''}>← Câu trước</button>
      <div class="tiny" id="ans-count"></div>
      <button class="btn sm" id="btn-next">${n===total?'Nộp bài & xem phân tích →':'Câu tiếp →'}</button>
    </div>
  </div>`;

  const optsBox=el('opts');
  q.options.forEach((o,i)=>{
    const d=document.createElement('div');
    d.className='opt'; d.dataset.i=i;
    d.innerHTML=`<div class="k">${'ABCDE'[i]}</div><div>${o}</div>`;
    if(answered){
      d.classList.add('disabled');
      if(i===q.correct) d.classList.add('correct');
      else if(i===S.answers[q.id]) d.classList.add('wrong');
    }
    d.onclick=()=>chooseAnswer(i);
    optsBox.appendChild(d);
  });
  if(answered) renderExplain(q);
  updateAnsCount();
  el('btn-prev').onclick=()=>{ if(S.idx>0){S.idx--;renderTest();} };
  el('btn-next').onclick=()=>{
    if(S.answers[q.id]===undefined){ toast('Hãy chọn một đáp án trước 🙂'); return; }
    if(n===total) finishTest(); else { S.idx++; renderTest(); }
  };
}
function updateAnsCount(){
  const done=Object.keys(S.answers).length;
  const c=el('ans-count'); if(c) c.textContent=`Đã trả lời ${done}/${S.order.length}`;
}
function chooseAnswer(i){
  const q=currentQ();
  if(S.answers[q.id]!==undefined) return; // lock after answering
  S.answers[q.id]=i;
  renderTest();
}
function renderExplain(q){
  const correct=S.answers[q.id]===q.correct;
  let html=`<div class="explain ${correct?'':'bad'}">
      <b>${correct?'✅ Chính xác!':'❌ Chưa đúng.'}</b> Đáp án đúng: <b>${'ABCDE'[q.correct]}. ${q.options[q.correct]}</b><br>${q.exp}`;
  if(!correct && q.link && CROSSLINK_MSG[q.link]){
    html+=`<div class="link-note">🔗 Liên kết cơ sở–lâm sàng: sai câu này sẽ kích hoạt ôn lại <b>${CROSSLINK_MSG[q.link]}</b>.</div>`;
  }
  html+='</div>';
  el('exp-slot').innerHTML=html;
}

/* ---------- SCORING & GAP ANALYSIS ---------- */
function domPct(k){ const s=S.scores[k]; return s&&s.total? Math.round(s.correct/s.total*100) : null; }

function finishTest(){
  // ORCHESTRATOR -> AssessmentAgent.grade + AnalystAgent.analyze (merges cumulatively)
  const questions=S.order.map(id=>S.quiz[id]);   // dùng đề đã đảo đáp án của lượt này
  const {analysis}=ORCH.submit(questions, S.answers, S.scores);
  S.analysis=analysis;
  DB.saveSession({mode:S.mode, at:Date.now(), n:questions.length});
  saveState();  // lưu trình độ tích lũy
  if(S.mode==='diagnostic') renderResults();
  else finishDaily();
}

  // badges (CoachAgent -> streak-motivator)
  el('badgebox').innerHTML = coach.badges.all.map(b=>{
    const on=coach.badges.unlocked.includes(b.id);
    return `<span class="badge ${on?'':'locked'}">${b.ico} ${b.name}${on?'':' 🔒'}</span>`;
  }).join('');

  el('btn-daily').onclick=startDaily;
  el('btn-review').onclick=renderResults;
  el('btn-restart').onclick=()=>{clearState();S.day=1;S.streak=1;S.badges=[];S.scores={};renderOnboard();show('scr-onboard');};
  saveState();  // lưu badges/streak/ngày sau khi dashboard cập nhật
}
function goalLabel(){return {both:'Step 1 & 2 CK',step1:'Step 1',step2:'Step 2 CK',review:'Ôn tổng lực 250+'}[S.user.goal];}

/* ContentAgent (lesson-composer + knowledge-retriever) + MentorAgent (case-simulator) */
function showLesson(domain){
  const box=el('lessonbox'); if(!box) return;
  const les=ORCH.lesson(domain);      // ContentAgent
  const cas=ORCH.case(domain);        // MentorAgent
  const dom=DOMAINS[domain];
  box.innerHTML=`
    <div class="card" style="background:rgba(79,172,254,.06);border-color:rgba(79,172,254,.2)">
      <div class="section-head" style="margin-bottom:8px">
        <h2 class="sec" style="font-size:15px">${dom.icon} ${les.title}</h2>
        <span class="chip">Step ${les.step} · 📚 ${les.guideline.join(', ')}</span>
      </div>
      <div class="tiny" style="margin-bottom:8px"><b>Sinh lý bệnh:</b> ${les.pathophysiology}</div>
      <div class="tiny" style="margin-bottom:4px"><b>Tiếp cận:</b> ${les.algorithm.map((s,i)=>`${i+1}) ${s}`).join(' → ')}</div>
      <div class="tiny" style="margin:8px 0 4px"><b>High-yield:</b></div>
      <ul style="margin:0 0 8px 18px;padding:0;font-size:12px;color:var(--text-secondary)">
        ${les.highYield.map(h=>`<li style="margin-bottom:4px">${h}</li>`).join('')}
      </ul>
      <div class="divider" style="margin:10px 0"></div>
      <div class="tiny" style="margin-bottom:6px"><b>🩺 Ca lâm sàng Socratic (VINDICATE) — MentorAgent:</b></div>
      ${cas?cas.phases.map(p=>`<div class="tiny" style="margin-bottom:5px"><b style="color:var(--text-accent)">${p.name}:</b> ${p.prompt}</div>`).join(''):''}
    </div>`;
  box.scrollIntoView({behavior:'smooth',block:'nearest'});
}

/* ---------- DAILY ADAPTIVE TEST ---------- */
function startDaily(){
  // ORCHESTRATOR -> AssessmentAgent.createDaily (gap-detector weighted mcq-generator, ngẫu nhiên)
  const {questions, focus}=ORCH.daily(S);
  S.dailyFocus=focus;
  S.mode='daily'; buildAttempt(questions); S.idx=0; S.answers={};
  renderTest();
}
function finishDaily(){
  S.day++; S.streak++;
  // today's score = only the questions answered in this daily session
  let tc=0,tt=0;
  S.order.forEach(id=>{ const q=S.quiz[id];
    if(S.answers[q.id]===undefined) return; tt++; if(S.answers[q.id]===q.correct) tc++; });
  const pct=tt?Math.round(tc/tt*100):0;
  renderDashboard();  // CoachAgent re-evaluates badges/streak inside
  toast(`🔥 Streak +1! Bài hôm nay: ${tc}/${tt} đúng (${pct}%)`);
}

/* Huy hiệu do CoachAgent (skill streak-motivator) quản lý trong engine. */

/* ---------- BOOT ---------- */
if(loadState()){
  renderDashboard();                       // có tiến trình cũ -> vào thẳng dashboard theo trình độ
  toast(`👋 Chào mừng trở lại! Ngày ${S.day} · streak ${S.streak}🔥`);
}else{
  renderOnboard();
}
</script>
